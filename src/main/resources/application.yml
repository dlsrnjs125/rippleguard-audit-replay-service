spring:
  application:
    name: rippleguard-audit-replay-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:rippleguard-audit-replay-service}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    kafka:
      enabled: true

rippleguard:
  contracts:
    repository: dlsrnjs125/rippleguard-contracts
    commit: 751f43c88c1bef860c76398eed24b3d60225b931
    event-schema-version: 1.1.0
  loan:
    repository: dlsrnjs125/rippleguard-loan-service
    commit: 1f78f8c3358fc0437b15f7b32ae8b2d4028a4800
  governance:
    repository: dlsrnjs125/rippleguard-governance-service
    commit: 053206df5d114b723bc6135642cbfcddeb54b2ba
  phase2:
    pending-causation:
      ttl: ${PHASE2_PENDING_CAUSATION_TTL:PT10M}
      retry-delay: ${PHASE2_PENDING_CAUSATION_RETRY_DELAY:PT30S}
      max-attempts: ${PHASE2_PENDING_CAUSATION_MAX_ATTEMPTS:5}
      batch-size: ${PHASE2_PENDING_CAUSATION_BATCH_SIZE:100}
      reconcile-delay-ms: ${PHASE2_PENDING_CAUSATION_RECONCILE_DELAY_MS:30000}
  kafka:
    enabled: ${AUDIT_KAFKA_ENABLED:true}
    topics:
      loan-application-submitted: ${TOPIC_LOAN_APPLICATION_SUBMITTED:loan.application.submitted.v1}
      governance-review-started: ${TOPIC_GOVERNANCE_REVIEW_STARTED:governance.review.started.v1}
      agent-evaluation-requested: ${TOPIC_AGENT_EVALUATION_REQUESTED:agent.evaluation.requested.v1}
      agent-evaluation-completed: ${TOPIC_AGENT_EVALUATION_COMPLETED:agent.evaluation.completed.v1}
      governance-agent-result-validated: ${TOPIC_GOVERNANCE_AGENT_RESULT_VALIDATED:governance.agent-result.validated.v1}
      loan-decision-commanded: ${TOPIC_LOAN_DECISION_COMMANDED:loan.decision.commanded.v1}
      loan-decision-finalized: ${TOPIC_LOAN_DECISION_FINALIZED:loan.decision.finalized.v1}
