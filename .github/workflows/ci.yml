name: audit-replay-service-ci

on:
  pull_request:
  push:
    branches:
      - main
      - phase/1-audit-foundation

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: ./mvnw test
      - run: ./mvnw package
      - name: Docker build
        run: |
          image="rippleguard-audit-replay-service:${GITHUB_SHA::12}"
          docker build \
            --build-arg "OCI_REVISION=${GITHUB_SHA}" \
            --build-arg "OCI_SOURCE=https://github.com/dlsrnjs125/rippleguard-audit-replay-service" \
            -t "${image}" \
            .
      - name: Verify OCI labels
        run: |
          image="rippleguard-audit-replay-service:${GITHUB_SHA::12}"
          revision="$(docker image inspect "${image}" --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}')"
          source="$(docker image inspect "${image}" --format '{{ index .Config.Labels "org.opencontainers.image.source" }}')"
          test "${revision}" = "${GITHUB_SHA}"
          test "${source}" = "https://github.com/dlsrnjs125/rippleguard-audit-replay-service"
